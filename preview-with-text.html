<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero Image Preview with Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            color: #333;
        }

        .preview-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .text-overlay {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
        }

        .text-overlay h2 {
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: clamp(32px, 8vw, 72px);
            font-weight: 700;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow:
                0 2px 4px rgba(0, 0, 0, 0.4),
                0 4px 8px rgba(0, 0, 0, 0.3);
            margin: 0;
            line-height: 1.2;
        }

        .text-accent {
            display: block;
            width: 120px;
            height: 3px;
            background: linear-gradient(90deg, #00D084 0%, #00D084 50%, transparent 100%);
            margin: 16px auto 0;
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .text-overlay {
                bottom: 40px;
            }

            .text-overlay h2 {
                font-size: clamp(24px, 6vw, 48px);
                letter-spacing: 1px;
            }

            .text-accent {
                width: 80px;
                height: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Landing Page Hero - Text Overlay Preview</h1>
        <div class="preview-wrapper">
            <img src="vecteezy_ai-generated-a-red-sports-car-is-driving-down-a-road_36793650.jpeg" alt="Red sports car at sunset" class="preview-image">
            <div class="text-overlay">
                <h2>UNLEASHED<br>FUEL SAVING</h2>
                <div class="text-accent"></div>
            </div>
        </div>
    </div>
</body>
</html>
